  <style>
    :root {
      --teal-deep: #0f5052;
      --gold: #c9a961;
      --gold-bright: #e0c074;
      --cream: #f7f1e8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(circle at center, #16686b 0%, #0a3a3c 80%);
      color: var(--cream);
      font-family: 'Montserrat', Helvetica, Arial, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(201, 169, 97, 0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      margin: 0 auto 2rem;
      animation: spin 0.8s linear infinite;

    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--gold);
      font-weight: 500;
      font-size: 1.6rem;
      letter-spacing: 1px;

    }
    p {

      opacity: 0.85;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }
    a.btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.95rem 2.2rem;
      background: var(--gold);
      color: var(--teal-deep);
      text-decoration: none;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.85rem;
      transition: background .25s ease;
    }
    a.btn:hover { background: var(--gold-bright); }
    .home {
      display: inline-block;
      margin-top: 1.2rem;
      color: var(--cream);
      opacity: 0.6;
      font-size: 0.82rem;
      letter-spacing: 1px;
      text-decoration: none;
    }
    .home:hover { opacity: 1; color: var(--gold); }
    .brand {
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: 4px;
      color: var(--gold);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
